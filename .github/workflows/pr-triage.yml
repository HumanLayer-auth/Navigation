name: PR Triage

# PR이 열리면 Claude Code 에이전트를 띄워 prompt/triage-pr.md 규칙대로
# labels / assignee / project(status)를 자동 기입한다.
#
# Required secrets:
# - CLAUDE_CODE_OAUTH_TOKEN: Claude Pro/Max 구독 토큰
# - PROJECT_PAT: project + repo 스코프 PAT. 없으면 GITHUB_TOKEN 사용

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 에이전트로 PR 분류
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PROJECT_PAT || secrets.GITHUB_TOKEN }}
          prompt: |
            저장소의 `prompt/triage-pr.md` 규칙을 전문 그대로 읽고 따라서
            PR #${{ github.event.pull_request.number }} 를 분류해라.
            labels / Assignee(작성자) / Projects(보드 번호 1, Status="In Progress") 를
            gh CLI 로 기입한다. 코드 변경이 없는 문서 PR 이라도 세 항목 모두 채운다.
          claude_args: --allowedTools "Bash(gh:*),Read,Glob,Grep"
